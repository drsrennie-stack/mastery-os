<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mastery OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#080F1E; --navy-deep:#04070F; --rust:#8B3A2E; --rust-hover:#A0452F;
  --gold:#C9A14A; --gold-light:#D9B065; --cream:#F5F1E8; --white:#FFFFFF; --offwhite:#FAFAF9;
  --ink:#080F1E; --ink-soft:rgba(8,15,30,0.74); --ink-faint:rgba(8,15,30,0.50);
  --line:rgba(8,15,30,0.10); --line-soft:rgba(8,15,30,0.06);
  --shadow:0 1px 3px rgba(8,15,30,0.08); --lift:0 14px 34px -16px rgba(8,15,30,0.34);
  --disp:'Plus Jakarta Sans',system-ui,sans-serif;
  --r-sm:4px; --r:8px; --r-lg:14px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --fs:16px;
}
*{box-sizing:border-box}
html,body{margin:0}
html{font-size:var(--fs)}
body{background:var(--offwhite);color:var(--ink);font-family:var(--disp);-webkit-font-smoothing:antialiased;line-height:1.55;overflow-x:hidden}
h1,h2,h3{letter-spacing:-0.02em;color:var(--navy);line-height:1.12;margin:0}
button{font-family:inherit;cursor:pointer}
.skip{position:absolute;left:-999px;top:0;background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r);z-index:999}
.skip:focus{left:12px;top:12px}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:var(--r-sm)}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--rust);margin:0 0 10px}

/* ---------- logo ---------- */
.logo{display:inline-flex;align-items:center;gap:13px}
.logo svg{height:var(--logo-h,46px);flex:none}
.logo .lt{font-size:21px;font-weight:800;color:var(--navy);letter-spacing:-0.02em;line-height:1}
.logo.on-dark .lt{color:#fff}
.logo .lt .ac{color:var(--rust)}
.logo.on-dark .lt .ac{color:var(--gold)}
.logo .ls{font-size:8.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);display:block;margin-top:4px}
.logo.on-dark .ls{color:var(--cream);opacity:.72}

/* ---------- transitions ---------- */
.fade-enter{animation:fadeUp .5s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.hidden{display:none!important}

/* ===================== SETUP (macOS-style first boot) ===================== */
#setup{position:fixed;inset:0;background:radial-gradient(120% 120% at 50% 0%,#0C1530 0%,var(--navy) 45%,var(--navy-deep) 100%);color:var(--cream);z-index:50;display:flex;flex-direction:column}
#setup .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px}
#setup .panel{width:100%;max-width:540px;text-align:center}
#setup h2{color:#fff;font-size:clamp(26px,5vw,38px);font-weight:800;margin:0 0 14px}
#setup p.sub{color:var(--cream);opacity:.85;font-size:16px;max-width:46ch;margin:0 auto 28px;line-height:1.6}
#setup .field{text-align:left;max-width:420px;margin:0 auto}
#setup label.lbl{display:block;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin:0 0 8px}
.txt{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.18);color:#fff;font-family:inherit;font-size:18px;padding:14px 16px;border-radius:var(--r);outline:none;transition:border-color .2s,background .2s}
.txt:focus{border-color:var(--gold);background:rgba(255,255,255,.10)}
.txt::placeholder{color:rgba(245,241,232,.4)}

/* choice cards */
.choices{display:grid;gap:12px;max-width:440px;margin:0 auto;text-align:left}
.choices.two{grid-template-columns:1fr 1fr}
.choice{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.16);border-radius:var(--r);padding:16px 18px;color:var(--cream);transition:border-color .2s,background .2s,transform .2s;display:flex;gap:13px;align-items:flex-start;text-align:left}
.choice:hover{border-color:rgba(201,161,74,.6);transform:translateY(-1px)}
.choice[aria-pressed="true"]{border-color:var(--gold);background:rgba(201,161,74,.14)}
.choice .ck{flex:none;width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,.35);margin-top:1px;display:grid;place-items:center;transition:.2s}
.choice[aria-pressed="true"] .ck{border-color:var(--gold);background:var(--gold)}
.choice .ck svg{width:12px;height:12px;opacity:0;transition:.2s}
.choice[aria-pressed="true"] .ck svg{opacity:1}
.choice .ttl{font-weight:700;color:#fff;font-size:15px;display:block;margin-bottom:3px}
.choice .dsc{font-size:13px;opacity:.78;line-height:1.45}

/* course catalog */
.catalog{max-width:460px;margin:0 auto;text-align:left;max-height:46vh;overflow:auto;padding:2px 8px 4px 2px}
.catgroup{font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);opacity:.9;margin:18px 0 9px;padding-left:2px}
.catgroup:first-child{margin-top:0}
.choice.compact{padding:12px 14px;margin-bottom:8px}
.choice.compact .ck{width:20px;height:20px}
.choice .tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:999px;margin-left:7px;vertical-align:middle;background:rgba(255,255,255,.14);color:var(--cream)}
.choice .tag.live{background:var(--gold);color:var(--navy)}
.choice[disabled]{opacity:.46;cursor:default}
.choice[disabled]:hover{transform:none;border-color:rgba(255,255,255,.16);background:rgba(255,255,255,.05)}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:440px;margin:0 auto}
.chip{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.18);color:var(--cream);font-family:inherit;font-size:15px;font-weight:600;padding:11px 18px;border-radius:999px;transition:.2s}
.chip:hover{border-color:rgba(201,161,74,.6)}
.chip[aria-pressed="true"]{border-color:var(--gold);background:var(--gold);color:var(--navy)}

/* toggles (learn-best) */
.toggles{display:grid;gap:2px;max-width:440px;margin:0 auto;background:rgba(255,255,255,.05);border-radius:var(--r);overflow:hidden;text-align:left}
.tg{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.07)}
.tg:last-child{border-bottom:0}
.tg .tx{font-size:14px}
.tg .tx b{color:#fff;font-weight:600;display:block}
.tg .tx span{font-size:12px;opacity:.7}
.sw{flex:none;width:46px;height:27px;border-radius:999px;background:rgba(255,255,255,.18);border:0;position:relative;transition:.22s}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.22s var(--ease)}
.sw[aria-pressed="true"]{background:var(--gold)}
.sw[aria-pressed="true"]::after{transform:translateX(19px)}

/* setup footer / nav */
#setup .navbar{padding:20px 24px 30px;display:flex;align-items:center;justify-content:space-between;max-width:600px;margin:0 auto;width:100%}
.dots{display:flex;gap:7px}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:.3s}
.dot.on{background:var(--gold);width:22px;border-radius:999px}
.btn{font-family:inherit;font-weight:700;font-size:15px;border-radius:var(--r);border:0;padding:13px 26px;transition:transform .15s,background .2s,opacity .2s}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--gold);color:var(--navy)}
.btn.primary:hover{background:var(--gold-light)}
.btn.ghost{background:transparent;color:var(--cream);opacity:.75;padding:13px 8px}
.btn.ghost:hover{opacity:1}
.btn.block{width:100%;padding:16px;font-size:16px;margin-top:6px}
.btn[disabled]{opacity:.35;pointer-events:none}

.note{font-size:12.5px;color:var(--cream);opacity:.62;max-width:42ch;margin:18px auto 0;line-height:1.5}
.note b{color:var(--gold);font-weight:700}

/* building animation */
.builder{max-width:380px;margin:0 auto}
.bar{height:6px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;margin:30px 0 18px}
.bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rust),var(--gold));border-radius:999px;transition:width .5s var(--ease)}
.buildline{font-size:14px;color:var(--cream);opacity:.8;min-height:20px;transition:opacity .3s}

/* logo intro pulse */
.intro-logo{transform-origin:center;animation:rise .8s var(--ease) both}
@keyframes rise{0%{opacity:0;transform:scale(.82) translateY(14px)}100%{opacity:1;transform:none}}

/* ===================== APP SHELL ===================== */
#app{min-height:100vh;display:flex;flex-direction:column;opacity:0}
#app.live{opacity:1;animation:fadeIn .5s ease both}
.topbar{position:sticky;top:0;z-index:20;background:rgba(250,250,249,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px max(18px,4vw)}
.topbar .row{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:16px}
.topbar .spacer{flex:1}
.mode-badge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border-radius:999px;border:1.5px solid var(--line)}
.mode-Steady{color:var(--navy);background:rgba(8,15,30,.05)}
.mode-Stretch{color:#fff;background:var(--rust)}
.mode-Rebuild{color:var(--navy);background:rgba(201,161,74,.22);border-color:rgba(201,161,74,.5)}
.icbtn{width:40px;height:40px;border-radius:var(--r);border:1.5px solid var(--line);background:var(--white);display:grid;place-items:center;color:var(--ink-soft);transition:.18s;box-shadow:var(--shadow)}
.icbtn:hover{transform:translateY(-1px);box-shadow:var(--lift);color:var(--navy)}
.icbtn svg{width:19px;height:19px}

.main{flex:1;width:100%;max-width:1080px;margin:0 auto;padding:30px max(18px,4vw) 60px}

/* Right Now front door */
.rightnow{background:var(--navy);color:var(--cream);border-radius:var(--r-lg);padding:40px;position:relative;overflow:hidden;box-shadow:var(--lift)}
.rightnow::after{content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(201,161,74,.20),transparent 70%)}
.rightnow .eyebrow{color:var(--gold);margin-bottom:14px}
.rightnow h1{color:#fff;font-size:clamp(26px,4.4vw,38px);font-weight:800;margin:0 0 10px;max-width:18ch;position:relative}
.rightnow .why{color:var(--cream);opacity:.82;font-size:15.5px;max-width:48ch;margin:0 0 26px;position:relative;line-height:1.55}
.rightnow .meta{display:flex;gap:22px;flex-wrap:wrap;margin:0 0 28px;position:relative}
.rightnow .meta div{font-size:13px;color:var(--cream);opacity:.72}
.rightnow .meta b{display:block;color:#fff;opacity:1;font-size:20px;font-weight:800;letter-spacing:-.01em;margin-bottom:2px}
.start{position:relative;background:var(--gold);color:var(--navy);font-size:17px;font-weight:800;border:0;border-radius:var(--r);padding:17px 38px;display:inline-flex;align-items:center;gap:10px;box-shadow:0 8px 20px -8px rgba(201,161,74,.7);transition:transform .15s,box-shadow .2s,background .2s}
.start:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 12px 26px -8px rgba(201,161,74,.8)}
.start:active{transform:translateY(0)}
.start svg{width:18px;height:18px}

/* grid of cards under front door */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:24px}
.panel-card{background:var(--white);border-radius:var(--r);border-left:4px solid var(--gold);box-shadow:var(--shadow);padding:20px 22px}
.panel-card.rust{border-left-color:var(--rust)}
.panel-card h3{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin:0 0 14px}
.ready-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ready-row:last-child{margin-bottom:0}
.ready-row .nm{font-size:14px;font-weight:600;color:var(--navy);flex:none;width:96px}
.meter{flex:1;height:9px;border-radius:999px;background:var(--line);overflow:hidden}
.meter>i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--rust),var(--gold));transition:width .8s var(--ease)}
.ready-row .pct{font-size:13px;font-weight:700;color:var(--ink-soft);flex:none;width:38px;text-align:right;font-variant-numeric:tabular-nums}
.weak{display:flex;flex-wrap:wrap;gap:8px}
.weak span{font-size:13px;font-weight:600;background:rgba(139,58,46,.08);color:var(--rust);padding:6px 12px;border-radius:999px}
.plan-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft);font-size:14px}
.plan-item:last-child{border:0}
.plan-item .tk{width:20px;height:20px;border-radius:5px;border:2px solid var(--line);flex:none;display:grid;place-items:center}
.plan-item.done .tk{background:var(--gold);border-color:var(--gold)}
.plan-item.done .tk svg{opacity:1}
.plan-item .tk svg{width:11px;height:11px;opacity:0}
.plan-item.done .lab{color:var(--ink-faint);text-decoration:line-through}
.plan-item .lab{color:var(--navy);font-weight:600;flex:1}
.plan-item .fmt{font-size:12px;color:var(--ink-faint)}

/* ===================== SESSION RUNNER ===================== */
#session{position:fixed;inset:0;z-index:40;background:var(--offwhite);display:flex;flex-direction:column;opacity:0}
#session.live{opacity:1;animation:fadeIn .35s ease both}
.s-top{padding:16px max(18px,4vw);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;background:var(--white)}
.s-top .ttl{font-weight:800;color:var(--navy);font-size:16px}
.s-top .spacer{flex:1}
.timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:20px;color:var(--navy);letter-spacing:.02em;display:flex;align-items:center;gap:9px}
.timer .dotpulse{width:9px;height:9px;border-radius:50%;background:var(--rust);animation:pulse 1.6s ease infinite}
.timer.break .dotpulse{background:var(--gold)}
@keyframes pulse{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}
.linkbtn{background:transparent;border:0;color:var(--ink-faint);font-family:inherit;font-size:13px;font-weight:600;padding:8px}
.linkbtn:hover{color:var(--rust)}
.s-rhythm{height:5px;background:var(--line);display:flex}
.s-rhythm i{height:100%;background:var(--gold);width:0;transition:width 1s linear}
.s-body{flex:1;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:34px max(18px,4vw) 60px}
.s-inner{width:100%;max-width:620px}

/* activity picker */
.picker h2{font-size:24px;font-weight:800;margin:0 0 4px}
.picker .lead{color:var(--ink-soft);font-size:15px;margin:0 0 4px}
.picker .sysline{color:var(--rust);font-size:13px;font-weight:700;margin:0 0 24px}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.act{background:var(--white);border:1.5px solid var(--line);border-radius:var(--r);padding:22px 20px;text-align:left;transition:.18s;box-shadow:var(--shadow)}
.act:hover{transform:translateY(-2px);box-shadow:var(--lift);border-color:rgba(201,161,74,.5)}
.act .ic{width:42px;height:42px;border-radius:var(--r);background:rgba(201,161,74,.14);color:var(--rust);display:grid;place-items:center;margin-bottom:14px}
.act .ic svg{width:22px;height:22px}
.act b{display:block;color:var(--navy);font-size:16px;font-weight:800;margin-bottom:4px}
.act span{color:var(--ink-soft);font-size:13px;line-height:1.45}

/* recall card */
.recall .qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.recall .lvl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--rust)}
.recall .count{font-size:13px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
.qcard{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--lift);padding:38px 34px;min-height:230px;display:flex;flex-direction:column;justify-content:center;border-top:4px solid var(--gold)}
.qcard .q{font-size:22px;font-weight:700;color:var(--navy);line-height:1.4;margin:0}
.qcard .a{font-size:20px;font-weight:800;color:var(--rust);margin:20px 0 0;animation:fadeUp .4s var(--ease) both}
.qcard .hint{font-size:14px;color:var(--ink-faint);margin-top:14px}
.reveal{margin-top:22px;display:flex;flex-direction:column;gap:12px;align-items:center}
.reveal .btn.primary{background:var(--navy);color:#fff}
.reveal .btn.primary:hover{background:#13234d}
.rate{display:flex;gap:10px;width:100%}
.rate button{flex:1;border-radius:var(--r);border:1.5px solid var(--line);background:var(--white);font-family:inherit;font-weight:700;font-size:14px;padding:15px 8px;transition:.16s;color:var(--navy)}
.rate button:hover{transform:translateY(-2px);box-shadow:var(--lift)}
.rate .miss:hover{border-color:var(--rust);color:var(--rust)}
.rate .hard:hover{border-color:var(--gold)}
.rate .got:hover{border-color:#2f7d4f;color:#2f7d4f}
.rate small{display:block;font-weight:500;font-size:11px;color:var(--ink-faint);margin-top:3px}

/* labeling lab */
.label-lab .lead{color:var(--ink-soft);font-size:15px;margin:0 0 6px}
.label-lab .prompt{font-size:21px;font-weight:800;color:var(--navy);margin:0 0 20px}
.label-lab .prompt em{color:var(--rust);font-style:normal}
.diagram{position:relative;background:var(--white);border-radius:var(--r-lg);box-shadow:var(--lift);padding:18px;margin:0 auto;max-width:380px}
.diagram svg{display:block;width:100%;height:auto}
.hot{position:absolute;width:26px;height:26px;border-radius:50%;border:2.5px solid var(--rust);background:rgba(139,58,46,.12);transform:translate(-50%,-50%);transition:.16s;cursor:pointer}
.hot:hover{background:rgba(139,58,46,.28);transform:translate(-50%,-50%) scale(1.12)}
.hot.right{border-color:#2f7d4f;background:#2f7d4f}
.hot.wrong{border-color:var(--rust);background:var(--rust);animation:shake .4s}
@keyframes shake{0%,100%{transform:translate(-50%,-50%)}25%{transform:translate(-58%,-50%)}75%{transform:translate(-42%,-50%)}}
.lab-feedback{text-align:center;font-weight:700;font-size:15px;margin-top:18px;min-height:22px}
.lab-feedback.ok{color:#2f7d4f}
.lab-feedback.no{color:var(--rust)}

/* tutor (prompt export) */
.tutor .promptbox{background:var(--navy);color:var(--cream);border-radius:var(--r);padding:20px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;max-height:280px;overflow:auto;font-family:ui-monospace,Menlo,monospace}
.tutor .row{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}

/* break screen */
.breakscreen{text-align:center;max-width:440px;margin:0 auto}
.breakscreen .big{font-size:30px;font-weight:800;color:var(--navy);margin:0 0 10px}
.breakscreen p{color:var(--ink-soft);font-size:16px;margin:0 0 26px}
.earned{display:inline-flex;align-items:center;gap:8px;background:rgba(201,161,74,.16);color:var(--rust);font-weight:700;font-size:13px;padding:8px 16px;border-radius:999px;margin-bottom:24px}

/* session complete */
.s-done{text-align:center;max-width:460px;margin:0 auto}
.s-done .ring{width:96px;height:96px;margin:0 auto 22px}
.s-done h2{font-size:28px;margin:0 0 10px}
.s-done p{color:var(--ink-soft);font-size:16px;margin:0 0 8px}
.s-done .promo{background:rgba(201,161,74,.14);border-radius:var(--r);padding:14px 18px;color:var(--navy);font-weight:600;font-size:14px;margin:20px 0 26px}
.s-done .promo b{color:var(--rust)}

/* ===================== SETTINGS DRAWER ===================== */
#settings{position:fixed;inset:0;z-index:60;opacity:0;pointer-events:none}
#settings.live{opacity:1;pointer-events:auto;animation:fadeIn .25s ease both}
#settings .scrim{position:absolute;inset:0;background:rgba(6,10,24,.5)}
#settings .sheet{position:absolute;right:0;top:0;bottom:0;width:min(440px,92vw);background:var(--offwhite);box-shadow:var(--lift);overflow-y:auto;transform:translateX(100%);transition:transform .32s var(--ease)}
#settings.live .sheet{transform:none}
.sheet .sh-top{padding:22px 24px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.sheet .sh-top h2{font-size:20px}
.sheet section{padding:22px 24px;border-bottom:1px solid var(--line)}
.sheet section:last-child{border:0}
.sheet .sech{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--rust);margin:0 0 14px}
.tg-light{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0}
.tg-light .tx b{display:block;color:var(--navy);font-weight:600;font-size:15px}
.tg-light .tx span{font-size:12.5px;color:var(--ink-faint)}
.sw-light{flex:none;width:46px;height:27px;border-radius:999px;background:var(--line);border:0;position:relative;transition:.22s}
.sw-light::after{content:"";position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:var(--shadow);transition:.22s var(--ease)}
.sw-light[aria-pressed="true"]{background:var(--gold)}
.sw-light[aria-pressed="true"]::after{transform:translateX(19px)}
.bar-note{background:var(--navy);color:var(--cream);border-radius:var(--r);padding:14px 16px;font-size:13.5px;line-height:1.5}
.bar-note b{color:var(--gold)}
.mode-pick{display:flex;gap:8px}
.mode-pick button{flex:1;border:1.5px solid var(--line);background:var(--white);border-radius:var(--r);padding:12px 6px;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink-soft);transition:.16s}
.mode-pick button[aria-pressed="true"]{border-color:var(--gold);background:rgba(201,161,74,.14);color:var(--navy)}
.danger{color:var(--rust);background:transparent;border:1.5px solid rgba(139,58,46,.3);border-radius:var(--r);padding:12px;font-weight:700;font-family:inherit;width:100%;font-size:14px}
.danger:hover{background:rgba(139,58,46,.06)}

/* toast */
#toast{position:fixed;bottom:26px;left:50%;transform:translate(-50%,30px);background:var(--navy);color:#fff;padding:13px 22px;border-radius:var(--r);font-weight:600;font-size:14px;box-shadow:var(--lift);z-index:80;opacity:0;transition:.3s var(--ease);pointer-events:none}
#toast.show{opacity:1;transform:translate(-50%,0)}

/* learning-needs reconfiguration hooks */
body.larger{--fs:18px}
body.larger .qcard .q{font-size:24px}
body.easierread{line-height:1.85;letter-spacing:.01em}
body.easierread .rightnow .why,body.easierread .picker .lead,body.easierread .qcard .q{max-width:42ch;line-height:1.85}
body.calm .rightnow::after{display:none}
body.calm .start{box-shadow:none}
/* reduce clutter hides secondary panels on the home view */
body.clutterfree #secondary{display:none}
body.clutterfree .main{max-width:760px}

@media(max-width:640px){
  .acts{grid-template-columns:1fr}
  .choices.two{grid-template-columns:1fr}
  .rightnow{padding:30px 24px}
  #setup .navbar{flex-wrap:nowrap}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<!-- ============== SETUP WIZARD ============== -->

  <div class="navbar">

</div>

<!-- ============== APP ============== -->
<div id="app" aria-hidden="true">
  <header class="topbar">
    <div class="row">

        <svg viewBox="40 10 125 148" aria-hidden="true"><g transform="translate(0,18)">
          <g transform="translate(60,0) rotate(8 0 130)"><circle cx="0" cy="20" r="10" fill="#C9A14A"/><path d="M 0,32 C -10,32 -16,36 -16,42 C -16,55 -13,68 -11,82 C -10,100 -12,118 -14,130 L 14,130 C 12,118 10,100 11,82 C 13,68 16,55 16,42 C 16,36 10,32 0,32 Z" fill="#C9A14A"/></g>
          <g transform="translate(100,0)"><circle cx="0" cy="10" r="11" fill="#8B3A2E"/><path d="M 0,22 C -11,22 -17,26 -17,34 C -17,52 -14,70 -12,86 C -11,108 -13,122 -15,132 L 15,132 C 13,122 11,108 12,86 C 14,70 17,52 17,34 C 17,26 11,22 0,22 Z" fill="#8B3A2E"/></g>
          <g transform="translate(140,0) rotate(-8 0 130)"><circle cx="0" cy="20" r="10" fill="#080F1E"/><path d="M 0,32 C -10,32 -16,36 -16,42 C -16,55 -13,68 -11,82 C -10,100 -12,118 -14,130 L 14,130 C 12,118 10,100 11,82 C 13,68 16,55 16,42 C 16,36 10,32 0,32 Z" fill="#080F1E"/></g>
        </g></svg>
        <span><span class="lt">Mastery <span class="ac">OS</span></span></span>
      </span>
      <div class="spacer"></div>
      <span class="mode-badge" id="modeBadge">Steady</span>
      <button class="icbtn" id="openSettings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <main class="main" id="mainentry"></main>
</div>

<!-- ============== SESSION ============== -->
<div id="session" aria-hidden="true" role="dialog" aria-label="Study session"></div>

<!-- ============== SETTINGS ============== -->
<div id="settings" aria-hidden="true"></div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
"use strict";

/* ---------- safe storage (persists as a downloaded file, in-memory fallback) ---------- */
const mem = {};
const store = {
  get(k){ try{ const v = localStorage.getItem(k); return v==null?(mem[k]??null):JSON.parse(v); }catch(e){ return mem[k]??null; } },
  set(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} mem[k]=v; },
  clear(){ try{ localStorage.removeItem('mastery-os'); }catch(e){} delete mem['mastery-os']; }
};

/* ---------- icons ---------- */
const I = {
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="#080F1E" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>',
  checkW:'<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>',
  play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5v14l12-7z"/></svg>',
  recall:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11a3 3 0 1 0 3-3M12 8V4M5 9l-2-2M19 9l2-2"/><rect x="6" y="11" width="12" height="9" rx="2"/></svg>',
  draw:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18z"/><path d="M2 2l7.586 7.586"/></svg>',
  tutor:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  label:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor"/></svg>',
  teach:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 11h-6M19 8v6"/></svg>'
};

/* ---------- content (A&P Practical: the heart) ---------- */
const TOPICS = ['Heart chambers','Great vessels','Valves','Heart wall'];
const CARDS = [
  {topic:'Heart chambers', q:'Which chamber pumps oxygenated blood to the entire body?', a:'Left ventricle'},
  {topic:'Heart chambers', q:'Which chamber receives deoxygenated blood from the body?', a:'Right atrium'},
  {topic:'Great vessels', q:'Name the largest artery in the body, leaving the left ventricle.', a:'Aorta'},
  {topic:'Great vessels', q:'Which vessel carries deoxygenated blood from the heart to the lungs?', a:'Pulmonary trunk'},
  {topic:'Valves', q:'Which valve sits between the left atrium and left ventricle?', a:'Mitral (bicuspid) valve'},
  {topic:'Heart wall', q:'Which layer of the heart wall does the actual contracting?', a:'Myocardium'}
];
// hotspots as % of the diagram container
const HOTSPOTS = [
  {id:'aorta', name:'Aorta', x:46, y:14},
  {id:'pulm', name:'Pulmonary trunk', x:60, y:20},
  {id:'svc', name:'Superior vena cava', x:34, y:20},
  {id:'ra', name:'Right atrium', x:30, y:42},
  {id:'rv', name:'Right ventricle', x:40, y:66},
  {id:'lv', name:'Left ventricle', x:62, y:64}
];

/* ---------- state ---------- */
const NEEDS = [
  {key:'shortBlocks', b:'Shorter focus blocks', s:'Work in 15-minute stretches instead of 25.'},
  {key:'noClock', b:'No clock on recall', s:'A timer measures speed, not knowing. The recall stays.'},
  {key:'clutterfree', b:'One thing at a time', s:'Hide everything except the task in front of you.'},
  {key:'larger', b:'Larger, easier-to-read text', s:'Bigger type and more breathing room.'},
  {key:'calm', b:'Calmer visuals', s:'Drop ambient glow and heavy shadows.'},
  {key:'easierread', b:'Generous line spacing', s:'Looser lines for easier tracking.'}
];
const BUNDLES = [
  {id:'adhd', ttl:'Hard to stay on one thing', dsc:'Short blocks, frequent breaks, one task on screen.', sets:['shortBlocks','clutterfree']},
  {id:'slow', ttl:'I need more time, not less knowing', dsc:'Takes the clock off recall and shortens blocks.', sets:['noClock','shortBlocks']},
  {id:'over', ttl:'Big tasks feel overwhelming', dsc:'One task at a time, calmer screen.', sets:['clutterfree','calm']},
  {id:'read', ttl:'Reading on screen is tiring', dsc:'Larger text and generous spacing.', sets:['larger','easierread']}
];

const CATALOG = [
  {group:'Foundational sciences', items:[
    {name:'Anatomy', d:'Structures, regions, and the lab practical.', status:'soon'},
    {name:'Physiology', d:'Mechanisms and the systems that run them.', status:'soon'},
    {name:'Anatomy & Physiology I', d:'Practical Mastery. Labeling, stations, recall, readiness.', status:'live'},
    {name:'Anatomy & Physiology II', d:'The second-semester systems.', status:'soon'},
    {name:'Anatomy & Physiology (Non-Majors)', d:'One-semester survey for allied health and kinesiology.', status:'soon'},
    {name:'Microbiology', d:'Organisms, identification, and infectious disease.', status:'soon'}
  ]},
  {group:'Clinical sciences', items:[
    {name:'Pathophysiology', d:'How normal function breaks, and why.', status:'soon'},
    {name:'Pharmacology', d:'Drug classes, mechanisms, and safe administration.', status:'soon'}
  ]},
  {group:'Licensure prep', items:[
    {name:'Nursing (NCLEX-RN)', d:'Clinical judgment, prioritization, patient safety, and pharmacology across the Next Gen format.', status:'soon'}
  ]}
];

function freshState(){
  return {
    setupDone:false, name:'', course:'Anatomy & Physiology I',
    goal:'B', hours:6, examDays:14, mode:'Steady',
    needs:{}, bundles:[],
    mastery:{}, // topic -> {level:0..2, score:0..1}
    plan:[
      {id:'t1', lab:'Label the heart, anterior view', fmt:'Labeling', done:false},
      {id:'t2', lab:'Recall: chambers and great vessels', fmt:'Recall', done:false},
      {id:'t3', lab:'Today\u2019s consolidation pass', fmt:'Mixed', done:false}
    ]
  };
}
let S = store.get('mastery-os') || freshState();
TOPICS.forEach(t=>{ if(!S.mastery[t]) S.mastery[t]={level:0, score: t==='Heart wall'?0.35: t==='Valves'?0.45:0.6}; });
function save(){ store.set('mastery-os', S); }

const $ = s=>document.querySelector(s);
const setupEl=$('#setup'), panelEl=$('#setupPanel'), appEl=$('#app'),
      sessionEl=$('#session'), settingsEl=$('#settings'), toastEl=$('#toast');

function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),2200); }

/* apply learning-needs to the document */
function applyNeeds(){
  ['larger','easierread','calm','clutterfree'].forEach(k=>document.body.classList.toggle(k, !!S.needs[k]));
}

/* ====================================================================== */
/*  SETUP WIZARD                                                          */
/* ====================================================================== */
const LOGO_DARK = `<span class="logo on-dark intro-logo" style="--logo-h:64px">
  <svg viewBox="40 10 125 148" aria-hidden="true"><g transform="translate(0,18)">
    <g transform="translate(60,0) rotate(8 0 130)"><circle cx="0" cy="20" r="10" fill="#C9A14A"/><path d="M 0,32 C -10,32 -16,36 -16,42 C -16,55 -13,68 -11,82 C -10,100 -12,118 -14,130 L 14,130 C 12,118 10,100 11,82 C 13,68 16,55 16,42 C 16,36 10,32 0,32 Z" fill="#C9A14A"/></g>
    <g transform="translate(100,0)"><circle cx="0" cy="10" r="11" fill="#8B3A2E"/><path d="M 0,22 C -11,22 -17,26 -17,34 C -17,52 -14,70 -12,86 C -11,108 -13,122 -15,132 L 15,132 C 13,122 11,108 12,86 C 14,70 17,52 17,34 C 17,26 11,22 0,22 Z" fill="#8B3A2E"/></g>
    <g transform="translate(140,0) rotate(-8 0 130)"><circle cx="0" cy="20" r="10" fill="#F5F1E8"/><path d="M 0,32 C -10,32 -16,36 -16,42 C -16,55 -13,68 -11,82 C -10,100 -12,118 -14,130 L 14,130 C 12,118 10,100 11,82 C 13,68 16,55 16,42 C 16,36 10,32 0,32 Z" fill="#F5F1E8"/></g>
  </g></svg></span>`;

let step = 0;
const STEPS = ['welcome','name','course','goal','time','exam','needs','build','done'];
const realSteps = ['name','course','goal','time','exam','needs']; // dotted progress only over these

function renderDots(){
  const dots = $('#dots'); dots.innerHTML='';
  realSteps.forEach((s,i)=>{
    const d=document.createElement('span'); d.className='dot';
    if(s===STEPS[step]) d.classList.add('on');
    dots.appendChild(d);
  });
  $('#dots').style.visibility = realSteps.includes(STEPS[step]) ? 'visible':'hidden';
}

function setupView(){
  const which=STEPS[step];
  renderDots();
  const back=$('#backBtn'), next=$('#nextBtn');
  back.style.visibility = (step>0 && which!=='build' && which!=='done')?'visible':'hidden';
  next.classList.remove('hidden'); back.classList.remove('hidden');
  next.disabled=false; next.textContent='Continue';

  let html='';
  if(which==='welcome'){
    html = `${LOGO_DARK}
      <h2 style="margin-top:26px">Welcome to Mastery OS</h2>
      <p class="sub">You choose the destination. The platform chooses the route. Let\u2019s get you set up. It takes about a minute.</p>`;
    next.textContent='Get started';
    back.style.visibility='hidden';
  }
  else if(which==='name'){
    html = `<p class="eyebrow" style="color:var(--gold)">First things first</p>
      <h2>What should we call you?</h2>
      <p class="sub">This is just for the greeting. Nothing here leaves your device.</p>
      <div class="field"><label class="lbl" for="nm">Your name</label>
      <input class="txt" id="nm" autocomplete="off" placeholder="e.g. Jordan" value="${esc(S.name)}"></div>`;
  }
  else if(which==='course'){
    html = `<p class="eyebrow" style="color:var(--gold)">Your course</p>
      <h2>What are you studying?</h2>
      <p class="sub">Pick your course. We\u2019re starting with the anatomy practical, the single most painful exam. Every course here runs on the same engines.</p>
      <div class="catalog">
        ${CATALOG.map(g=>`<p class="catgroup">${g.group}</p>${g.items.map(courseChoice).join('')}`).join('')}
      </div>`;
  }
  else if(which==='goal'){
    html = `<p class="eyebrow" style="color:var(--gold)">Your goal</p>
      <h2>What are you aiming for?</h2>
      <p class="sub">You set the target. The system works out the route, schedule, and difficulty to get you there.</p>
      <div class="choices">
        ${goalChoice('A','Top of the class','I want to master this cold.')}
        ${goalChoice('B','A strong, safe grade','Solid command without burning out.')}
        ${goalChoice('Pass','Pass with confidence','Clear the bar and feel ready.')}
      </div>`;
  }
  else if(which==='time'){
    html = `<p class="eyebrow" style="color:var(--gold)">Your time</p>
      <h2>How much study time per week?</h2>
      <p class="sub">Be honest, not aspirational. The schedule is built around what you actually have.</p>
      <div class="chips" id="hourChips">
        ${[3,6,9,12].map(h=>`<button class="chip" data-h="${h}" aria-pressed="${S.hours===h}">${h} hours</button>`).join('')}
      </div>`;
  }
  else if(which==='exam'){
    const d=new Date(); d.setDate(d.getDate()+ (S.examDays||14));
    const iso=d.toISOString().slice(0,10);
    html = `<p class="eyebrow" style="color:var(--gold)">Your exam</p>
      <h2>When is your practical?</h2>
      <p class="sub">Every review is anchored to this date, with a guaranteed final pass the day before.</p>
      <div class="field"><label class="lbl" for="exam">Practical date</label>
      <input class="txt" id="exam" type="date" value="${iso}" min="${new Date().toISOString().slice(0,10)}"></div>`;
  }
  else if(which==='needs'){
    html = `<p class="eyebrow" style="color:var(--gold)">How you learn best</p>
      <h2>Let\u2019s fit the platform to you.</h2>
      <p class="sub">Pick anything that sounds like you. These pre-set some options you can fine-tune next. You are choosing needs, never a diagnosis.</p>
      <div class="choices" id="bundles">
        ${BUNDLES.map(b=>`<button class="choice" data-bundle="${b.id}" aria-pressed="${S.bundles.includes(b.id)}">
          <span class="ck">${I.check}</span>
          <span><span class="ttl">${b.ttl}</span><span class="dsc">${b.dsc}</span></span></button>`).join('')}
      </div>
      <details style="max-width:440px;margin:18px auto 0;text-align:left">
        <summary style="cursor:pointer;color:var(--gold);font-size:13px;font-weight:700">Fine-tune the individual settings</summary>
        <div class="toggles" style="margin-top:12px" id="needToggles">
          ${NEEDS.map(n=>`<div class="tg"><span class="tx"><b>${n.b}</b><span>${n.s}</span></span>
            <button class="sw" data-need="${n.key}" aria-pressed="${!!S.needs[n.key]}" aria-label="${n.b}"></button></div>`).join('')}
        </div>
      </details>
      <p class="note"><b>The bar does not move.</b> These remove friction, not rigor. The exam is the same exam.</p>`;
  }
  else if(which==='build'){
    html = `<div class="builder">${LOGO_DARK}
      <h2 style="margin-top:22px">Building your Mastery OS</h2>
      <div class="bar"><i id="buildBar"></i></div>
      <p class="buildline" id="buildLine">Reading your course materials</p></div>`;
    back.classList.add('hidden'); next.classList.add('hidden');
  }
  else if(which==='done'){
    const d=new Date(); d.setDate(d.getDate()+S.examDays);
    html = `<div style="font-size:64px;line-height:1;margin-bottom:8px">${checkRing()}</div>
      <h2>You\u2019re all set${S.name?', '+esc(S.name):''}.</h2>
      <p class="sub">Your route to the ${esc(S.course)} practical is mapped${ S.bundles.length?', tuned to how you learn,':',' } and your reviews are scheduled. Here\u2019s the plan in one line:</p>
      <div style="background:rgba(255,255,255,.06);border-radius:var(--r);padding:18px;max-width:420px;margin:0 auto;text-align:left;font-size:14px;line-height:1.7">
        <div>Target: <b style="color:#fff">${goalLabel(S.goal)}</b></div>
        <div>Time: <b style="color:#fff">${S.hours} hours/week</b></div>
        <div>Practical: <b style="color:#fff">${d.toLocaleDateString(undefined,{month:'long',day:'numeric'})}</b> (${S.examDays} days)</div>
        <div>Mode: <b style="color:#fff">${S.mode}</b>, set from your goal</div>
      </div>`;
    next.textContent='Open Mastery OS';
    back.style.visibility='hidden';
  }

  panelEl.innerHTML = `<div class="fade-enter">${html}</div>`;
  wireStep(which);
}

function courseChoice(it){
  const live = it.status==='live';
  const tag = live ? '<span class="tag live">Live</span>' : '<span class="tag">In build</span>';
  return `<button class="choice compact" data-course="${esc(it.name)}" aria-pressed="${S.course===it.name}" ${live?'':'disabled'}>
    <span class="ck">${I.check}</span>
    <span><span class="ttl">${esc(it.name)} ${tag}</span><span class="dsc">${esc(it.d)}</span></span></button>`;
}
function goalChoice(v,t,d){
  return `<button class="choice" data-goal="${v}" aria-pressed="${S.goal===v}">
    <span class="ck">${I.check}</span>
    <span><span class="ttl">${t}</span><span class="dsc">${d}</span></span></button>`;
}
function goalLabel(g){ return g==='A'?'Top of the class':g==='B'?'A strong, safe grade':'Pass with confidence'; }
function modeFromGoal(g){ return g==='A'?'Stretch':g==='Pass'?'Rebuild':'Steady'; }

function wireStep(which){
  if(which==='build'){ runBuild(); return; }
  if(which==='name'){
    const nm=$('#nm'); nm.focus();
    nm.addEventListener('input',()=>S.name=nm.value.trim());
    nm.addEventListener('keydown',e=>{ if(e.key==='Enter') $('#nextBtn').click(); });
  }
  if(which==='course'){
    panelEl.querySelectorAll('[data-course]').forEach(b=>b.addEventListener('click',()=>{
      panelEl.querySelectorAll('[data-course]').forEach(x=>x.setAttribute('aria-pressed','false'));
      b.setAttribute('aria-pressed','true'); S.course=b.dataset.course;
    }));
  }
  if(which==='goal'){
    panelEl.querySelectorAll('[data-goal]').forEach(b=>b.addEventListener('click',()=>{
      panelEl.querySelectorAll('[data-goal]').forEach(x=>x.setAttribute('aria-pressed','false'));
      b.setAttribute('aria-pressed','true'); S.goal=b.dataset.goal; S.mode=modeFromGoal(S.goal);
    }));
  }
  if(which==='time'){
    panelEl.querySelectorAll('[data-h]').forEach(b=>b.addEventListener('click',()=>{
      panelEl.querySelectorAll('[data-h]').forEach(x=>x.setAttribute('aria-pressed','false'));
      b.setAttribute('aria-pressed','true'); S.hours=+b.dataset.h;
    }));
  }
  if(which==='exam'){
    const ex=$('#exam');
    ex.addEventListener('change',()=>{
      const diff=Math.max(1, Math.round((new Date(ex.value)-new Date())/86400000));
      S.examDays=diff;
    });
  }
  if(which==='needs'){
    const sync=()=>{ NEEDS.forEach(n=>{ const t=panelEl.querySelector(`[data-need="${n.key}"]`); if(t) t.setAttribute('aria-pressed', !!S.needs[n.key]); }); };
    panelEl.querySelectorAll('[data-bundle]').forEach(b=>b.addEventListener('click',()=>{
      const id=b.dataset.bundle, bun=BUNDLES.find(x=>x.id===id);
      const isOn=S.bundles.includes(id);
      if(isOn){ S.bundles=S.bundles.filter(x=>x!==id); }
      else { S.bundles.push(id); bun.sets.forEach(k=>S.needs[k]=true); }
      b.setAttribute('aria-pressed', !isOn);
      sync();
    }));
    panelEl.querySelectorAll('[data-need]').forEach(t=>t.addEventListener('click',()=>{
      const k=t.dataset.need; S.needs[k]=!S.needs[k]; t.setAttribute('aria-pressed', !!S.needs[k]);
    }));
  }
}

function closeSession(){

function recordRecall(r){
  sess.results.total++; if(r===2) sess.results.right++;

  m.score=clamp(m.score + (r===2?0.06:r===1?0.0:-0.05));

  const c=$('#pad'), ctx=c.getContext('2d'); ctx.lineWidth=3; ctx.lineCap='round'; ctx.strokeStyle='#080F1E';

  const down=e=>{drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};

  const up=()=>drawing=false;
  c.addEventListener('mousedown',down);c.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
  c.addEventListener('touchstart',down);c.addEventListener('touchmove',move);c.addEventListener('touchend',up);

}

    const k=t.dataset.need; S.needs[k]=!S.needs[k]; t.setAttribute('aria-pressed',!!S.needs[k]);
    applyNeeds(); save(); renderHome();
    toast(S.needs[k]?'On. Applied everywhere.':'Off.');
  }));
  $('#resetAll').addEventListener('click',()=>{
    if(confirm('This clears your setup and progress on this device, then restarts setup. Continue?')){
      store.clear(); S=freshState(); TOPICS.forEach(t=>S.mastery[t]={level:0,score:t==='Heart wall'?0.35:t==='Valves'?0.45:0.6});
      document.body.className=''; location.reload();
    }
  });
}
function closeSettings(){ settingsEl.classList.remove('live'); settingsEl.setAttribute('aria-hidden','true'); setTimeout(()=>settingsEl.innerHTML='',300); }

/*  helpers + boot                                                        */
/* ====================================================================== */
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function clamp(n){ return Math.max(0,Math.min(1,n)); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function heartSVG(){
  return `<svg viewBox="0 0 200 220" aria-label="Anterior view of the heart">
    <!-- great vessels -->
    <path d="M88 36 q4 -22 -4 -30" fill="none" stroke="#8B3A2E" stroke-width="13" stroke-linecap="round" opacity=".9"/>
    <path d="M112 30 q2 -16 14 -18" fill="none" stroke="#080F1E" stroke-width="12" stroke-linecap="round" opacity=".75"/>
    <rect x="60" y="6" width="13" height="40" rx="6" fill="#080F1E" opacity=".6"/>
    <!-- heart body -->
    <path d="M100 60 C 70 30, 28 44, 30 86 C 32 128, 74 158, 100 196 C 126 158, 168 128, 170 86 C 172 44, 130 30, 100 60 Z"
      fill="#F5F1E8" stroke="#080F1E" stroke-width="3"/>
    <!-- septum + chamber hints -->
    <path d="M100 70 C 96 110, 98 150, 100 188" fill="none" stroke="#080F1E" stroke-width="2.2" opacity=".5"/>
    <path d="M62 78 q30 14 64 0" fill="none" stroke="#080F1E" stroke-width="2" opacity=".35"/>
    <text x="58" y="120" font-size="11" fill="#8B3A2E" opacity=".5" font-family="Plus Jakarta Sans">RA/RV</text>
    <text x="118" y="118" font-size="11" fill="#8B3A2E" opacity=".5" font-family="Plus Jakarta Sans">LA/LV</text>
  </svg>`;
}

function boot(){
  applyNeeds();
  if(S.setupDone){
    setupEl.classList.add('hidden'); enterApp();
  } else {
    step=0; setupView();
  }
}
boot();
